  #header p { margin: 4px 0 0; font-size: 12px; color: #888; }

</div>
<div id="network"></div>
<div id="info">

  <p id="info-meta"></p>

</div>
<script>

const data = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
const options = {
  nodes: { shape: 'dot', font: { color: '#fff', size: 14 }, borderWidth: 2 },
  edges: { color: { color: '#444', highlight: '#7c3aed' }, width: 1, smooth: { type: 'continuous' } },
  physics: { stabilization: { iterations: 200 }, barnesHut: { gravitationalConstant: -3000, springLength: 120 } },
  interaction: { hover: true, tooltipDelay: 100, zoomView: true, dragView: true }

const network = new vis.Network(container, data, options);
network.on('click', (params) => {
  if (params.nodes.length > 0) {
    const id = params.nodes[0];
    const info = document.getElementById('info');
    document.getElementById('info-name').textContent = id + '.md';
    document.getElementById('info-meta').textContent = 'Click to view on GitHub';
    document.getElementById('info-link').href = 'https://github.com/ski539181/second-brain/blob/main/' + id + '.md';
    document.getElementById('info-link').textContent = 'View ' + id + '.md →';
    info.classList.add('show');
  } else {
    document.getElementById('info').classList.remove('show');
  }
});
</script>
